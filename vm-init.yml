# vm-init.yml — configuration for vm-init.sh
# Minimal defaults for a usable Ubuntu development shell.
# Advanced networking, security, Docker, and GitHub tooling are opt-in below.

apt:
  enabled: true
  packages:
    shell: [fish]
    editor: [vim, neovim]
    build: [build-essential, git, curl, wget]
    system: [ca-certificates, gnupg, lsb-release]
    archive: [unzip]
    cli: [jq, fzf, ripgrep, fd-find]
    python: [python3-pip, python3-venv, pipx]
    extra: []

ufw:
  enabled: false
  ipv6: true
  defaults:
    incoming: deny
    outgoing: allow
  allow:
    - OpenSSH

fail2ban:
  enabled: false
  backend: systemd
  bantime: 1h
  findtime: 10m
  maxretry: 5
  banaction: auto
  ignoreip:
    - 127.0.0.1/8
    - ::1
  jails:
    sshd:
      enabled: true

dns:
  enabled: false
  server: https://base.dns.mullvad.net/dns-query
  listen_address: 127.0.0.1
  listen_port: 5353
  bootstrap:
    - 9.9.9.9
    - 149.112.112.112

docker:
  enabled: false

python:
  enabled: false
  tools: [uv, pre-commit]

github_tools:
  enabled: false
  gh: true
  act: false

github_releases:
  enabled: false
  generic:
    - repo: jesseduffield/lazydocker
      asset_pattern: "lazydocker_{version}_Linux_{arch}.tar.gz"
      binary: lazydocker
      arch_map: { amd64: x86_64, arm64: arm64 }
    - repo: sayanarijit/xplr
      asset_pattern: "xplr-linux{arch_suffix}.tar.gz"
      binary: xplr
      arch_map: { amd64: "", arm64: "-aarch64" }
    - repo: go-task/task
      asset_pattern: "task_linux_{arch}.tar.gz"
      binary: task
      arch_map: { amd64: amd64, arm64: arm64 }
  custom:
    bandwhich: true
    vortix: true
    somo: true

shell:
  enabled: true
  default_shell: fish
  fisher: false
  tide: false
  aliases: {}
  direnv: false
